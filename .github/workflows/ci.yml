name: ci

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Tool versions
        run: |
          shellcheck --version | head -2
          jq --version
          node --version
      - name: Lint (shell, node, json, style)
        run: ./scripts/lint.sh
