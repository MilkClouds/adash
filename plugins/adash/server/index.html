<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>adash: live agent status</title>
<style>
  :root{
    /* surface */
    --canvas:#faf9f5; --surface-soft:#f5f0e8; --surface-card:#efe9de; --cream-strong:#e8e0d2;
    --dark:#181715; --dark-elevated:#252320; --dark-soft:#1f1e1b;
    --hairline:#e6dfd8; --hairline-soft:#ebe6df;
    /* text */
    --ink:#141413; --body-strong:#252523; --body:#3d3d3a; --muted:#6c6a64; --muted-soft:#8e8b82;
    --on-dark:#faf9f5; --on-dark-soft:#a09d96;
    /* brand + semantic */
    --primary:#cc785c; --primary-active:#a9583e; --on-primary:#ffffff;
    --teal:#5db8a6; --amber:#e8a55a; --success:#5db872; --error:#c64545;
    /* type */
    --serif:ui-serif,Georgia,"Times New Roman",serif;
    --sans:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    /* radius */
    --r-sm:6px; --r-md:8px; --r-lg:12px; --pill:9999px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--canvas);color:var(--body);font:400 15px/1.55 var(--sans);-webkit-font-smoothing:antialiased}
  code{font:400 13px/1 var(--mono);background:var(--surface-card);border:1px solid var(--hairline);border-radius:var(--r-sm);padding:2px 7px;color:var(--ink)}

  /* ---- top bar ---- */
  .top{position:sticky;top:0;z-index:10;background:var(--canvas);border-bottom:1px solid var(--hairline)}
  .bar{display:flex;align-items:center;gap:14px;max-width:1200px;margin:0 auto;padding:0 24px;height:64px}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .mark{color:var(--ink);flex:none}
  .wordmark{font:500 19px/1 var(--sans);letter-spacing:-.01em;color:var(--ink)}
  .tagline{font:500 12px/1 var(--sans);letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding-left:13px;margin-left:1px;border-left:1px solid var(--hairline)}
  .stat{margin-left:auto;display:flex;align-items:center;gap:18px;font:400 13px/1 var(--sans);color:var(--muted)}
  .conn{display:flex;align-items:center;gap:8px}
  #conntxt{text-transform:uppercase;letter-spacing:.1em;font-weight:500;font-size:12px}
  .cdot{width:8px;height:8px;border-radius:50%;background:var(--success);flex:none}
  .cdot.off{background:var(--error)}
  #count b{color:var(--ink);font-weight:600}
  .clock{font:400 12px/1 var(--mono);color:var(--muted-soft);font-variant-numeric:tabular-nums}
  .tally{display:flex;flex-wrap:wrap;gap:8px;max-width:1200px;margin:0 auto;padding:13px 24px}
  .tally:empty{display:none}
  .seg{display:inline-flex;align-items:center;gap:8px;font:500 12px/1 var(--sans);letter-spacing:.04em;text-transform:uppercase;color:var(--muted);background:var(--surface-card);border-radius:var(--pill);padding:7px 13px}
  .seg i{width:7px;height:7px;border-radius:50%;background:var(--c);flex:none}
  .seg b{color:var(--ink);font-weight:600;font-size:13px}

  /* ---- board ---- */
  .wrap{max-width:1200px;margin:0 auto;padding:24px 24px 80px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(358px,1fr));gap:20px;align-items:start}

  .card{
    --st:var(--muted-soft);
    position:relative;background:var(--surface-card);border:1px solid var(--hairline);
    border-radius:var(--r-lg);padding:24px;
  }
  .status-active{--st:var(--success)} .status-waiting{--st:var(--amber)}
  .status-blocked{--st:var(--primary)} .status-pending{--st:var(--teal)} .status-done{--st:var(--muted-soft)}
  .status-blocked{border-color:color-mix(in srgb,var(--primary) 50%,var(--hairline))}
  .card.stale{opacity:.62}

  .chead{display:flex;align-items:center;gap:10px}
  .badge{display:inline-flex;align-items:center;gap:7px;font:500 12px/1 var(--sans);letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--pill);padding:5px 11px}
  .badge .d{width:7px;height:7px;border-radius:50%;background:var(--st);flex:none}
  .status-blocked .badge{background:var(--primary);border-color:var(--primary);color:var(--on-primary)}
  .status-blocked .badge .d{background:var(--on-primary)}
  .age{margin-left:auto;font:400 12px/1 var(--mono);color:var(--muted-soft);font-variant-numeric:tabular-nums}
  .x{flex:none;background:none;border:0;color:var(--muted-soft);cursor:pointer;font-size:13px;line-height:1;padding:3px 5px;border-radius:var(--r-sm)}
  .x:hover{color:var(--error);background:color-mix(in srgb,var(--error) 10%,transparent)}

  .headline{margin:14px 0 0;font:400 21px/1.28 var(--serif);letter-spacing:-.3px;color:var(--ink);word-break:break-word}
  .headline.muted{color:var(--muted);font-style:italic;font-size:19px}

  .eyebrow{font:500 11px/1 var(--sans);letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin:18px 0 8px}
  .now p{margin:5px 0;color:var(--body-strong);font-size:15px}
  .now ul{margin:5px 0 0;padding-left:18px;color:var(--body-strong)} .now li{margin:3px 0}

  /* history as a dark terminal log (product chrome) */
  .log{margin-top:6px;background:var(--dark);border-radius:var(--r-md);padding:15px 17px}
  .log .eyebrow{color:var(--on-dark-soft);margin:0 0 11px}
  .tl{list-style:none;margin:0;padding:0}
  .tl li{display:grid;grid-template-columns:42px 1fr;gap:13px;padding:3px 0;font:400 13px/1.55 var(--mono)}
  .tl .t{color:var(--on-dark-soft);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
  .tl .ev{color:var(--on-dark)}
  .tl li:first-child .t{color:var(--teal)}

  /* needs-your-input: the one generous coral moment */
  .needs{margin-top:16px;background:var(--primary);border-radius:var(--r-md);padding:15px 18px}
  .needs .eyebrow{color:var(--on-primary);opacity:.85;margin:0 0 8px}
  .needs ul{margin:0;padding-left:18px}
  .needs li{color:var(--on-primary);font-size:15px;line-height:1.5;margin:4px 0}

  /* skeleton while first report is tidied */
  .skel{display:flex;flex-direction:column;gap:9px;margin-top:8px}
  .skel span{height:10px;border-radius:var(--r-sm);background:linear-gradient(90deg,var(--cream-strong) 0%,var(--surface-soft) 50%,var(--cream-strong) 100%);background-size:200% 100%;animation:shim 1.5s linear infinite}
  .skel span:nth-child(1){width:80%} .skel span:nth-child(2){width:64%} .skel span:nth-child(3){width:72%}

  /* message input + secondary send */
  .cmd{display:flex;align-items:center;gap:10px;margin-top:20px;padding-top:18px;border-top:1px solid var(--hairline-soft)}
  .msg{flex:1;min-width:0;background:var(--canvas);border:1px solid var(--hairline);border-radius:var(--r-md);padding:10px 14px;font:400 14px/1.4 var(--sans);color:var(--ink)}
  .msg::placeholder{color:var(--muted-soft)}
  .msg:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 15%,transparent)}
  .send{flex:none;background:var(--canvas);border:1px solid var(--hairline);color:var(--ink);border-radius:var(--r-md);padding:10px 17px;font:500 14px/1 var(--sans);cursor:pointer}
  .send:active{background:var(--cream-strong)}
  .send:disabled{opacity:.5;cursor:default}

  .sid{margin-top:12px;font:400 12px/1.4 var(--mono);color:var(--muted-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sid b{color:#bcb2a1;font-weight:400}

  .empty{display:none;text-align:center;padding:110px 20px 90px}
  .empty h2{font:400 30px/1.15 var(--serif);letter-spacing:-.5px;color:var(--ink);margin:0 0 14px}
  .empty p{margin:8px 0;color:var(--muted);font-size:15px}

  .card.enter{animation:fade .3s ease both}
  .card.flash{animation:flash 1.2s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes flash{0%{box-shadow:0 0 0 1px var(--primary),0 8px 22px -10px color-mix(in srgb,var(--primary) 65%,transparent)}100%{box-shadow:none}}
  @keyframes shim{to{background-position:-200% 0}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  @media (max-width:560px){
    .bar{flex-wrap:wrap;gap:10px;height:auto;padding:12px 18px} .tagline{display:none} .stat{gap:12px}
    .wrap{padding:18px 16px 60px} .grid{grid-template-columns:1fr;gap:16px} .card{padding:20px}
  }
</style>
</head>
<body>
<div class="top">
  <div class="bar">
    <div class="brand">
      <svg class="mark" width="19" height="19" viewBox="0 0 18 18" aria-hidden="true">
        <g stroke="currentColor" stroke-width="2.1" stroke-linecap="round">
          <line x1="9" y1="2" x2="9" y2="16"/><line x1="3.2" y1="4.6" x2="14.8" y2="13.4"/>
          <line x1="14.8" y1="4.6" x2="3.2" y2="13.4"/>
        </g>
      </svg>
      <span class="wordmark">adash</span>
      <span class="tagline">live agent status</span>
    </div>
    <div class="stat">
      <span class="conn"><span id="cdot" class="cdot off"></span><span id="conntxt">offline</span></span>
      <span id="count"><b>0</b> agents</span>
      <span id="clock" class="clock">--:--:--</span>
    </div>
  </div>
  <div class="tally" id="tally"></div>
</div>

<div class="wrap">
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">
    <h2>No agents reporting</h2>
    <p>Run <code>adash report "your status"</code> inside a session and it lands here.</p>
    <p>Each report is tidied into a live card you can read at a glance and message back into.</p>
  </div>
</div>

<script>
const ORDER=['blocked','active','pending','waiting','done'];
const RANK={blocked:0,active:1,pending:2,waiting:3,done:4};
const CVAR={blocked:'var(--primary)',active:'var(--success)',pending:'var(--teal)',waiting:'var(--amber)',done:'var(--muted-soft)'};
const cards=new Map();

const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function ago(ms){const s=Math.round(ms/1000);if(s<45)return s+'s';const m=Math.round(s/60);if(m<60)return m+'m';const h=Math.round(m/60);return h<24?h+'h':Math.round(h/24)+'d';}

function parseSections(body){
  const secs=[]; let cur=null;
  for(const raw of (body||'').split('\n')){
    const h=raw.match(/^\s*#{1,6}\s+(.*\S)\s*$/);
    if(h){cur={title:h[1].trim(),lines:[]};secs.push(cur);continue;}
    if(!cur){cur={title:'',lines:[]};secs.push(cur);}
    cur.lines.push(raw);
  }
  return secs.filter(s=>s.title||s.lines.some(l=>l.trim()));
}
const strip=l=>l.replace(/^\s*[-*]\s+/,'').trim();
function para(lines){
  const ls=lines.map(l=>l.replace(/\s+$/,'')).filter(l=>l.trim());
  if(!ls.length)return '';
  if(ls.some(l=>/^\s*[-*]\s+/.test(l)))
    return '<ul>'+ls.filter(l=>/^\s*[-*]\s+/.test(l)).map(l=>'<li>'+esc(strip(l))+'</li>').join('')+'</ul>';
  return ls.map(l=>'<p>'+esc(l.trim())+'</p>').join('');
}
function timeline(lines){
  const items=lines.map(strip).filter(Boolean);
  if(!items.length)return '';
  return '<ol class="tl">'+items.map(it=>{
    const m=it.match(/^(\d{1,2}:\d{2}(?::\d{2})?)\s+(.*)$/);
    return '<li><span class="t">'+esc(m?m[1]:'')+'</span><span class="ev">'+esc(m?m[2]:it)+'</span></li>';
  }).join('')+'</ol>';
}
function needs(lines){
  const items=lines.map(strip).filter(Boolean);
  const joined=items.join(' ').toLowerCase().replace(/\s+/g,' ').trim();
  if(!items.length||/^none\.?$/.test(joined))return '';
  return '<div class="needs"><div class="eyebrow">Needs your input</div><ul>'+items.map(i=>'<li>'+esc(i)+'</li>').join('')+'</ul></div>';
}
function renderBody(w){
  if(w.pending)return '<div class="skel"><span></span><span></span><span></span></div>';
  let html='';
  for(const sec of parseSections(w.body)){
    const t=sec.title.toLowerCase();
    if(/needs/.test(t)) html+=needs(sec.lines);
    else if(/history|log|timeline|events?/.test(t)){ const tl=timeline(sec.lines); if(tl) html+='<div class="log"><div class="eyebrow">'+esc(sec.title)+'</div>'+tl+'</div>'; }
    else{ const p=para(sec.lines); if(p) html+='<div class="now"><div class="eyebrow">'+esc(sec.title||'Now')+'</div>'+p+'</div>'; }
  }
  return html;
}

async function send(sid,input,btn){
  const t=input.value.trim(); if(!t)return;
  input.value=''; input.disabled=true; if(btn)btn.disabled=true;
  try{await fetch('/inbox/'+encodeURIComponent(sid),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:t})});}catch{}
  input.disabled=false; if(btn)btn.disabled=false;
  input.placeholder='delivered'; input.focus();
  setTimeout(()=>input.placeholder='message this agent',1600);
}
async function del(sid){
  if(!confirm('Remove this agent from the board?\nIf it is still running, it returns on its next report.'))return;
  try{await fetch('/delete/'+encodeURIComponent(sid),{method:'POST'});}catch{}
  const c=cards.get(sid); if(c){c.el.remove();cards.delete(sid);}
}

function ensureCard(w){
  let c=cards.get(w.sid); if(c)return c;
  const el=document.createElement('article');
  el.className='card enter status-'+w.status; el.dataset.st=w.status;
  el.innerHTML=`<div class="chead"><span class="badge"><span class="d"></span><span class="bt"></span></span>
    <span class="age"></span>
    <button class="x" title="Remove from board" aria-label="Remove agent">Remove</button></div>
    <h2 class="headline"></h2><div class="sections"></div>
    <form class="cmd" autocomplete="off">
    <input class="msg" placeholder="message this agent" aria-label="Message this agent">
    <button class="send" type="submit">Send</button></form>
    <div class="sid"><b>id</b> <span class="sidv"></span></div>`;
  const q=s=>el.querySelector(s);
  const refs={bt:q('.bt'),d:q('.d'),age:q('.age'),headline:q('.headline'),sections:q('.sections'),input:q('.msg'),sidv:q('.sidv')};
  q('.cmd').addEventListener('submit',e=>{e.preventDefault();send(w.sid,refs.input,q('.send'));});
  q('.x').addEventListener('click',()=>del(w.sid));
  refs.sidv.textContent=w.sid; refs.sidv.parentElement.title=w.sid;
  setTimeout(()=>el.classList.remove('enter'),340);
  c={el,refs,sig:''}; cards.set(w.sid,c); return c;
}
function updateCard(w){
  const c=ensureCard(w), {el,refs}=c;
  if(el.dataset.st!==w.status){el.classList.remove('status-'+el.dataset.st);el.classList.add('status-'+w.status);el.dataset.st=w.status;}
  el.classList.toggle('stale',!!w.stale);
  const tag=w.pending?'tidying':w.status;
  if(refs.bt.textContent!==tag)refs.bt.textContent=tag;
  const age=w.pending?'first report':ago(w.ageMs);
  if(refs.age.textContent!==age)refs.age.textContent=age;
  const hl=w.headline||(w.pending?'reading first report':'awaiting report');
  if(refs.headline.textContent!==hl){refs.headline.textContent=hl;refs.headline.classList.toggle('muted',!w.headline);}
  const sig=w.status+'|'+w.headline+'|'+w.body;
  if(sig!==c.sig){
    refs.sections.innerHTML=renderBody(w);
    if(c.sig!==''){el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),1250);}
    c.sig=sig;
  }
}

function setConn(ok){
  document.getElementById('cdot').className='cdot'+(ok?'':' off');
  document.getElementById('conntxt').textContent=ok?'live':'offline';
}
function render(s){
  const workers=s.workers.map(w=>({...w,stale:w.ageMs>180000&&!w.pending}))
    .sort((a,b)=>(RANK[a.status]??9)-(RANK[b.status]??9)||a.ageMs-b.ageMs);
  const present=new Set();
  for(const w of workers){present.add(w.sid);updateCard(w);}
  for(const[sid,c]of cards)if(!present.has(sid)){c.el.remove();cards.delete(sid);}
  const grid=document.getElementById('grid');
  workers.forEach((w,i)=>{const el=cards.get(w.sid).el;if(grid.children[i]!==el)grid.appendChild(el);});

  const counts={}; workers.forEach(w=>counts[w.status]=(counts[w.status]||0)+1);
  document.getElementById('tally').innerHTML=ORDER.filter(k=>counts[k])
    .map(k=>`<span class="seg" style="--c:${CVAR[k]}"><i></i><b>${counts[k]}</b> ${k}</span>`).join('');
  const n=workers.length;
  document.getElementById('count').innerHTML='<b>'+n+'</b> '+(n===1?'agent':'agents');
  document.getElementById('clock').textContent=new Date(s.now).toLocaleTimeString([],{hour12:false});
  document.getElementById('empty').style.display=n?'none':'block';
}
async function tick(){
  let s; try{s=await(await fetch('/state.json')).json();setConn(true);}catch{setConn(false);return;}
  render(s);
}
tick(); setInterval(tick,1500);
</script>
</body>
</html>
